name: Feature Request
description: Suggest an improvement or new feature
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user pain or gap in functionality.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like Crystal to do? UI sketches or code sketches welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about but rejected.

  - type: dropdown
    id: priority
    attributes:
      label: How much does this matter to you?
      options:
        - Nice to have
        - Would really improve my workflow
        - I'm blocked without this
    validations:
      required: true
